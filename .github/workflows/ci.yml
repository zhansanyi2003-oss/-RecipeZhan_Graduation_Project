name: Docker CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      POSTGRES_PASSWORD: 1234
      JWT_SECRET: ci-only-jwt-secret-change-me-not-production-1234567890

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Start test dependencies
        run: docker compose up -d db redis elasticsearch --wait --wait-timeout 300

      - name: Backend tests
        working-directory: Recipe_BackEnd
        run: ./mvnw -B test

      - name: Show dependency diagnostics on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail=100 db
          docker compose logs --tail=100 redis
          docker compose logs --tail=100 elasticsearch

      - name: Stop test dependencies
        if: always()
        run: docker compose down -v

  compose-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FRONTEND_PORT: 80
      BACKEND_PORT: 8080
      POSTGRES_PASSWORD: 1234
      JWT_SECRET: ci-only-jwt-secret-change-me-not-production-1234567890

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build compose images
        run: docker compose build

      - name: Start full stack and wait
        run: docker compose up -d --wait --wait-timeout 600

      - name: Check frontend
        run: curl -fsS http://localhost

      - name: Check backend health
        run: curl -fsS http://localhost:8080/actuator/health

      - name: Check Elasticsearch
        run: curl -fsS http://localhost:9200

      - name: Show diagnostics on failure
        if: failure()
        run: |
          docker compose ps -a
          docker inspect recipe_backend --format='{{json .State.Health}}' || true
          docker compose logs --tail=200 backend
          docker compose logs --tail=100 elasticsearch

      - name: Stop services
        if: always()
        run: docker compose down -v

  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [backend-test, compose-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Recipe_BackEnd
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Recipe_FrontEnd
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-frontend:${{ github.sha }}
