version: "3.8"

services:
  db:
    image: postgres:15

    container_name: recipe-postgres-db
    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: recipedb

    volumes:
      - pg_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: recipe_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - recipe_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: recipe_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - recipe_network

  redis:
    image: redis:7
    container_name: recipe_redis
    ports:
      - "6379:6379"
    networks:
      - recipe_network

networks:
  recipe_network:
    driver: bridge

volumes:
  es_data:
    driver: local
  pg_data:
    driver: local
