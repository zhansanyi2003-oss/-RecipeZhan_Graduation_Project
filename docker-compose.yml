services:
  frontend:
    build:
      context: ./Recipe_FrontEnd
    container_name: recipe_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - recipe_network
    healthcheck:
    test:
      ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null || exit 1"]
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 5s

  backend:
    build:
      context: ./Recipe_BackEnd
    container_name: recipe_backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/recipedb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-false}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_TIME_MS: 86400000
      RECIPE_STORAGE_TYPE: ${RECIPE_STORAGE_TYPE:-local}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-}
      AZURE_STORAGE_BLOB_PREFIX: ${AZURE_STORAGE_BLOB_PREFIX:-images/}
      AZURE_STORAGE_AVATAR_BLOB_PREFIX: ${AZURE_STORAGE_AVATAR_BLOB_PREFIX:-avatars/}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}

    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - recipe_network

  db:
    image: postgres:15
    container_name: recipe_postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: recipedb
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - recipe_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d recipedb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: recipe_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - recipe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    container_name: recipe_es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - recipe_network
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.8
    container_name: recipe_kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - recipe_network

networks:
  recipe_network:
    driver: bridge

volumes:
  pg_data:
    driver: local
  es_data:
    driver: local
