spring:
  application:
    name: Recipe_BackEnd

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s

  datasource:
    url: jdbc:postgresql://localhost:5432/recipedb
    username: root
    password: "1234"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2s

recipe:
  file:
    upload-dir: ${user.dir}/uploads/
    upload-url: /images/
