spring:
  application:
    name: Recipe_BackEnd

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s

  datasource:
    url: jdbc:postgresql://localhost:5432/recipedb
    username: root
    password: "1234"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2s

recipe:
  file:
    upload-dir: ${user.dir}/uploads/
    upload-url: /images/
    max-size-bytes: 5242880
  search-sync:
    fixed-delay-ms: ${RECIPE_SEARCH_SYNC_FIXED_DELAY_MS:30000}

security:
  jwt:
    secret: ${JWT_SECRET:dev-only-jwt-secret-change-me-please-1234567890}
    expiration-time-ms: ${JWT_EXPIRATION_TIME_MS:86400000}
