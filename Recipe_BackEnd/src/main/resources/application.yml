spring:
  application:
    name: Recipe_BackEnd

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recipedb}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      connect-timeout: 2s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2s
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 1

recipe:
  storage:
    type: ${RECIPE_STORAGE_TYPE:local}
  file:
    upload-dir: ${user.dir}/uploads/
    upload-url: /images/
    max-size-bytes: 5242880
  azure:
    storage:
      account-name: ${AZURE_STORAGE_ACCOUNT_NAME:}
      container-name: ${AZURE_STORAGE_CONTAINER_NAME:}
      blob-prefix: ${AZURE_STORAGE_BLOB_PREFIX:images/}
      avatar-blob-prefix: ${AZURE_STORAGE_AVATAR_BLOB_PREFIX:avatars/}
  search-sync:
    fixed-delay-ms: ${RECIPE_SEARCH_SYNC_FIXED_DELAY_MS:30000}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-time-ms: ${JWT_EXPIRATION_TIME_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
